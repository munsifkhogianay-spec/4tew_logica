<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logica</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f5f0ff;--surface:#fff;--surface2:#ede7ff;--border:#d8cef7;
      --accent:#8b5cf6;--accent2:#f472b6;--text:#2d1b69;--text-muted:#9381c0;
      --val-1:#059669;--val-0:#e11d48;--result-bg:#f0ebff;
      --error-bg:#fff0f4;--error-border:#f472b6;--shadow:0 4px 24px rgba(139,92,246,0.10);
    }
    body.dark {
      --bg:#13101f;--surface:#1e1830;--surface2:#2a2245;--border:#3a2f5e;
      --text:#e9e2ff;--text-muted:#7c6aaa;--result-bg:#1c1535;
      --error-bg:#2a0f1f;--shadow:0 4px 24px rgba(0,0,0,0.35);
    }
    [data-theme="mint"]{--bg:#f0fdf8;--surface:#fff;--surface2:#d1fae5;--border:#a7f3d0;--accent:#10b981;--accent2:#3b82f6;--text:#064e3b;--text-muted:#34d399;--result-bg:#ecfdf5;--shadow:0 4px 24px rgba(16,185,129,0.10);}
    [data-theme="peach"]{--bg:#fff7ed;--surface:#fff;--surface2:#ffe4cc;--border:#fdba74;--accent:#f97316;--accent2:#ec4899;--text:#7c2d12;--text-muted:#fb923c;--result-bg:#fff3e8;--shadow:0 4px 24px rgba(249,115,22,0.10);}
    [data-theme="sky"]{--bg:#f0f9ff;--surface:#fff;--surface2:#dbeafe;--border:#93c5fd;--accent:#3b82f6;--accent2:#8b5cf6;--text:#1e3a5f;--text-muted:#60a5fa;--result-bg:#eff6ff;--shadow:0 4px 24px rgba(59,130,246,0.10);}
    body.dark[data-theme="mint"]{--bg:#081a13;--surface:#0f2a1e;--surface2:#153d2b;--border:#1f5c3f;--text:#d1fae5;--text-muted:#34d399;--result-bg:#0d2319;--shadow:0 4px 24px rgba(0,0,0,0.35);}
    body.dark[data-theme="peach"]{--bg:#1a0f07;--surface:#2a180a;--surface2:#3d2210;--border:#6b3a15;--text:#fff0e0;--text-muted:#fb923c;--result-bg:#221208;--shadow:0 4px 24px rgba(0,0,0,0.35);}
    body.dark[data-theme="sky"]{--bg:#08101f;--surface:#0f1e35;--surface2:#162d4f;--border:#1e3f6e;--text:#dbeafe;--text-muted:#60a5fa;--result-bg:#0c1828;--shadow:0 4px 24px rgba(0,0,0,0.35);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;padding:32px 20px;min-height:100vh;transition:background 0.3s,color 0.3s;}
    .top-bar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
    h1{font-family:'Fraunces',serif;font-size:2.4rem;font-weight:700;color:var(--accent);letter-spacing:-1px;line-height:1;}
    h1 span{font-style:italic;font-weight:400;color:var(--accent2);}
    .subtitle{font-size:0.72rem;color:var(--text-muted);margin-top:5px;letter-spacing:1.5px;text-transform:uppercase;}
    .controls{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
    .theme-switcher{display:flex;gap:8px;align-items:center;}
    .theme-switcher span{font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-right:2px;}
    .dark-toggle{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;}
    .dark-toggle span{font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
    .toggle-track{width:38px;height:20px;background:var(--border);border-radius:99px;position:relative;transition:background 0.25s;}
    body.dark .toggle-track{background:var(--accent);}
    .toggle-thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform 0.25s;box-shadow:0 1px 4px rgba(0,0,0,0.2);}
    body.dark .toggle-thumb{transform:translateX(18px);}
    .theme-dot{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform 0.15s,border-color 0.15s;}
    .theme-dot:hover{transform:scale(1.2);}
    .theme-dot.active{border-color:var(--text);}
    .theme-dot[data-t="default"]{background:linear-gradient(135deg,#8b5cf6,#f472b6);}
    .theme-dot[data-t="mint"]{background:linear-gradient(135deg,#10b981,#3b82f6);}
    .theme-dot[data-t="peach"]{background:linear-gradient(135deg,#f97316,#ec4899);}
    .theme-dot[data-t="sky"]{background:linear-gradient(135deg,#3b82f6,#8b5cf6);}
    /* Tabs */
    .tabs{display:flex;gap:0;margin-bottom:20px;border:2px solid var(--accent);border-radius:14px;overflow:hidden;background:var(--surface);}
    .tab{flex:1;padding:10px 0;text-align:center;cursor:pointer;font-weight:700;font-size:0.85rem;color:var(--accent);background:transparent;border:none;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
    .tab.active{background:var(--accent);color:#fff;}
    .tab:not(.active):hover{background:var(--surface2);}
    /* Symbols */
    .symbols{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
    .sym-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;color:var(--accent);font-family:'DM Sans',sans-serif;font-size:1rem;padding:6px 12px;cursor:pointer;transition:all 0.15s;box-shadow:var(--shadow);}
    .sym-btn:hover{background:var(--surface2);border-color:var(--accent);transform:translateY(-1px);}
    .sym-label{font-size:0.6rem;color:var(--text-muted);display:block;text-align:center;margin-top:1px;}
    .hint{font-size:0.72rem;color:var(--text-muted);margin-bottom:14px;line-height:1.7;}
    .hint span{color:var(--accent);font-weight:600;}
    /* Mode row */
    .mode-row{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
    .mode-label{font-size:0.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
    .mode-btn{background:var(--surface);border:2px solid var(--accent);border-radius:10px;color:var(--accent);font-size:0.8rem;padding:6px 14px;cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;font-weight:600;}
    .mode-btn.active{background:var(--accent);color:#fff;}
    /* Input row */
    .input-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
    .formula-input{flex:1;min-width:200px;background:var(--surface);border:2px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',monospace;font-size:1rem;padding:10px 16px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;box-shadow:var(--shadow);}
    .formula-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 15%,transparent);}
    .formula-input.error{border-color:var(--error-border);}
    .formula-input::placeholder{color:var(--text-muted);opacity:0.7;}
    /* Buttons — always readable on light/dark */
    .btn{background:var(--accent);border:2px solid var(--accent);border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-weight:700;font-size:0.9rem;padding:10px 22px;cursor:pointer;transition:opacity 0.2s,transform 0.1s;}
    .btn:hover{opacity:0.85;transform:translateY(-1px);}
    .btn-clear{background:var(--surface);border:2px solid var(--accent);color:var(--accent);font-weight:600;}
    .btn-clear:hover{background:var(--surface2);}
    .btn-secondary{background:var(--surface);border:2px solid var(--accent);color:var(--accent);font-weight:600;}
    .btn-secondary:hover{background:var(--surface2);}
    /* Error */
    .error-msg{color:var(--error-border);font-size:0.78rem;margin-bottom:12px;padding:10px 14px;background:var(--error-bg);border-radius:10px;border-left:3px solid var(--error-border);}
    /* Table */
    .table-wrap{overflow-x:auto;border-radius:16px;border:1.5px solid var(--border);margin-top:16px;box-shadow:var(--shadow);background:var(--surface);}
    table{border-collapse:collapse;font-size:0.83rem;width:100%;}
    thead tr{background:var(--surface2);}
    th{padding:10px 16px;text-align:center;font-weight:700;border-bottom:2px solid var(--border);white-space:nowrap;border-right:1px solid var(--border);color:var(--text);}
    th:last-child{border-right:none;}
    th.var-col{color:var(--accent2);}
    th.sub-col{color:var(--text-muted);font-size:0.75rem;font-weight:500;}
    th.result-col{color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,var(--surface2));}
    td{padding:9px 16px;text-align:center;border-bottom:1px solid var(--border);border-right:1px solid var(--border);background:var(--surface);}
    td:last-child{border-right:none;}
    tr:last-child td{border-bottom:none;}
    tr:nth-child(even) td{background:color-mix(in srgb,var(--bg) 60%,var(--surface));}
    tr:hover td{background:var(--surface2)!important;}
    .val-0{color:var(--val-0);font-weight:700;}
    .val-1{color:var(--val-1);font-weight:700;}
    .result-td{background:var(--result-bg)!important;border-left:2px solid color-mix(in srgb,var(--accent) 30%,transparent)!important;}
    tr:hover .result-td{background:color-mix(in srgb,var(--accent) 12%,var(--surface))!important;}
    .divider-th{border-left:2px solid var(--border)!important;}
    .divider-td{border-left:2px solid var(--border)!important;}
    /* Stats */
    .stats{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
    .stat{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:10px 16px;font-size:0.75rem;box-shadow:var(--shadow);min-width:70px;}
    .stat-label{color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-size:0.63rem;}
    .stat-val{color:var(--text);font-size:1.05rem;font-weight:700;margin-top:3px;}
    .taut{color:#059669;} .contra{color:#e11d48;} .conting{color:#d97706;}
    /* Step */
    .step-nav{display:flex;gap:8px;align-items:center;margin-top:14px;flex-wrap:wrap;}
    .step-info{font-size:0.78rem;color:var(--text-muted);flex:1;text-align:center;}
    .step-row-highlight td{background:color-mix(in srgb,var(--accent) 18%,var(--surface))!important;}
    .step-active-cell{background:color-mix(in srgb,var(--accent) 35%,var(--surface))!important;outline:2px solid var(--accent);}
    /* Generator */
    .gen-panel{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:24px;box-shadow:var(--shadow);}
    .gen-row{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:18px;}
    .gen-label{font-size:0.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;min-width:110px;padding-top:7px;}
    .gen-chips{display:flex;gap:7px;flex-wrap:wrap;}
    /* Chip: outlined unselected, filled selected, always readable */
    .gen-chip{
      background:var(--surface);
      border:2px solid var(--accent);
      border-radius:10px;
      color:var(--accent);
      font-size:0.82rem;
      padding:6px 14px;
      cursor:pointer;
      transition:all 0.15s;
      font-family:'DM Sans',sans-serif;
      font-weight:600;
      display:flex;align-items:center;gap:5px;
    }
    .gen-chip:hover{background:var(--surface2);}
    .gen-chip.selected{background:var(--accent);color:#fff;}
    .gen-chip .ck{font-size:0.8rem;display:none;}
    .gen-chip.selected .ck{display:inline;}
    /* Var input */
    .var-input{background:var(--surface);border:2px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;padding:6px 12px;outline:none;width:72px;transition:border-color 0.2s;}
    .var-input:focus{border-color:var(--accent);}
    .var-preview{font-size:0.75rem;color:var(--text-muted);padding-top:6px;font-style:italic;}
    .section-head{font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:18px;}
    /* Generated result box */
    .gen-result{background:var(--surface2);border:2px solid var(--accent);border-radius:14px;padding:14px 18px;margin-top:18px;font-size:1.05rem;color:var(--accent);word-break:break-all;min-height:54px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-family:'DM Sans',monospace;}
    .gen-result span{flex:1;}
    .copy-btn{background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:0.78rem;padding:6px 14px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;font-weight:700;}
    .copy-btn:hover{opacity:0.85;}
    .gen-use-btn{background:var(--surface);border:2px solid var(--accent);border-radius:8px;color:var(--accent);font-size:0.78rem;padding:6px 14px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;font-weight:700;}
    .gen-use-btn:hover{background:var(--surface2);}
  </style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>Logica<span>.</span></h1>
    <div class="subtitle">Logische uitspraken · Waarheidstabellen · Stap voor stap</div>
  </div>
  <div class="controls">
    <div class="theme-switcher">
      <span>Kleur</span>
      <div class="theme-dot active" data-t="default" onclick="setTheme('default',this)"></div>
      <div class="theme-dot" data-t="mint" onclick="setTheme('mint',this)"></div>
      <div class="theme-dot" data-t="peach" onclick="setTheme('peach',this)"></div>
      <div class="theme-dot" data-t="sky" onclick="setTheme('sky',this)"></div>
    </div>
    <div class="dark-toggle" onclick="toggleDark()">
      <span id="darkLabel">Licht</span>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('solve',this)">🔍 Oplossen</button>
  <button class="tab" onclick="switchTab('gen',this)">⚡ Generator</button>
</div>

<!-- SOLVE TAB -->
<div id="tab-solve">
  <div class="symbols" id="symbols"></div>
  <div class="hint">
    Typ variabelen als letters: <span>p, q, r, ...</span> &nbsp;|&nbsp;
    <span>&amp; = ∧</span>, <span>| = ∨</span>, <span>~ = ¬</span>, <span>-&gt; = →</span>, <span>&lt;-&gt; = ↔</span>
  </div>
  <div class="mode-row">
    <span class="mode-label">Modus:</span>
    <button class="mode-btn active" id="modeAll" onclick="setMode('all')">Alles tegelijk</button>
    <button class="mode-btn" id="modeStep" onclick="setMode('step')">Stap voor stap</button>
  </div>
  <div class="input-row">
    <input id="formulaInput" class="formula-input" placeholder="bijv.  (¬p→p)↔p" />
    <button class="btn" onclick="solve()">Oplossen</button>
    <button class="btn btn-clear" onclick="clearAll()">Wis</button>
  </div>
  <div id="errorMsg" class="error-msg" style="display:none"></div>
  <div id="tableWrap"></div>
  <div id="stepNav" style="display:none" class="step-nav">
    <button class="btn btn-secondary" onclick="stepMove(-1)">← Vorige</button>
    <span class="step-info" id="stepInfo"></span>
    <button class="btn btn-secondary" onclick="stepMove(1)">Volgende →</button>
  </div>
  <div id="stats" class="stats"></div>
</div>

<!-- GENERATOR TAB -->
<div id="tab-gen" style="display:none">
  <div class="gen-panel">
    <div class="section-head">Formule generator</div>

    <div class="gen-row">
      <span class="gen-label">Type</span>
      <div class="gen-chips" id="type-chips">
        <button class="gen-chip selected" data-type="tautologie" onclick="selectType(this)"><span class="ck">✓</span> Tautologie</button>
        <button class="gen-chip" data-type="contradictie" onclick="selectType(this)"><span class="ck">✓</span> Contradictie</button>
        <button class="gen-chip" data-type="contingentie" onclick="selectType(this)"><span class="ck">✓</span> Contingentie</button>
      </div>
    </div>

    <div class="gen-row">
      <span class="gen-label">Variabelen</span>
      <div>
        <input type="number" class="var-input" id="varCount" min="1" max="10" value="2" oninput="updateVarPreview()">
        <div class="var-preview" id="varPreview">Gebruikt: p, q</div>
      </div>
    </div>

    <div class="gen-row">
      <span class="gen-label">Connectieven</span>
      <div class="gen-chips" id="op-chips">
        <button class="gen-chip selected" data-op="∧" onclick="toggleOp(this)"><span class="ck">✓</span> ∧ AND</button>
        <button class="gen-chip selected" data-op="∨" onclick="toggleOp(this)"><span class="ck">✓</span> ∨ OR</button>
        <button class="gen-chip selected" data-op="→" onclick="toggleOp(this)"><span class="ck">✓</span> → IMP</button>
        <button class="gen-chip selected" data-op="↔" onclick="toggleOp(this)"><span class="ck">✓</span> ↔ EQV</button>
        <button class="gen-chip selected" data-op="¬" onclick="toggleOp(this)"><span class="ck">✓</span> ¬ NOT</button>
      </div>
    </div>

    <button class="btn" onclick="generateFormula()">Genereer formule</button>

    <div class="gen-result" id="genResult">
      <span id="genFormula" style="color:var(--text-muted);font-size:0.88rem;font-family:'DM Sans',sans-serif;font-weight:400">Klik op "Genereer formule" om te beginnen...</span>
    </div>
  </div>
</div>

<script>
  function setTheme(t,el){document.body.setAttribute('data-theme',t==='default'?'':t);document.querySelectorAll('.theme-dot').forEach(d=>d.classList.remove('active'));el.classList.add('active');}
  function toggleDark(){const d=document.body.classList.toggle('dark');document.getElementById('darkLabel').textContent=d?'Donker':'Licht';}
  function switchTab(name,el){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
    document.getElementById('tab-solve').style.display=name==='solve'?'':'none';
    document.getElementById('tab-gen').style.display=name==='gen'?'':'none';
  }
  let currentMode='all';
  function setMode(m){currentMode=m;document.getElementById('modeAll').classList.toggle('active',m==='all');document.getElementById('modeStep').classList.toggle('active',m==='step');}

  const SYMS=[{s:"¬",l:"NOT"},{s:"∧",l:"AND"},{s:"∨",l:"OR"},{s:"→",l:"IMP"},{s:"↔",l:"EQV"},{s:"(",l:""},{s:")",l:""}];
  const inp=document.getElementById("formulaInput");
  SYMS.forEach(({s,l})=>{
    const b=document.createElement("button");b.className="sym-btn";
    b.innerHTML=s+(l?`<span class="sym-label">${l}</span>`:"");
    b.onclick=()=>{const st=inp.selectionStart,en=inp.selectionEnd;inp.value=inp.value.slice(0,st)+s+inp.value.slice(en);inp.focus();inp.setSelectionRange(st+s.length,st+s.length);};
    document.getElementById("symbols").appendChild(b);
  });
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")solve();});

  function showError(msg){const el=document.getElementById("errorMsg");el.textContent="⚠ "+msg;el.style.display="block";inp.classList.add("error");}
  function hideError(){document.getElementById("errorMsg").style.display="none";inp.classList.remove("error");}
  function clearAll(){inp.value="";hideError();document.getElementById("tableWrap").innerHTML="";document.getElementById("stats").innerHTML="";document.getElementById("stepNav").style.display="none";}

  function tokenize(f){
    const tk=[];let i=0;
    while(i<f.length){
      const c=f[i];
      if(/\s/.test(c)){i++;continue;}
      if(/[a-zA-Z]/.test(c)){tk.push({type:"VAR",val:c});i++;continue;}
      if(c==="¬"||c==="~"||c==="!"){tk.push({type:"NOT"});i++;continue;}
      if(c==="∧"||c==="&"){tk.push({type:"AND"});i++;continue;}
      if(c==="∨"||c==="|"){tk.push({type:"OR"});i++;continue;}
      if(c==="→"){tk.push({type:"IMP"});i++;continue;}
      if(c==="-"&&f[i+1]===">"){tk.push({type:"IMP"});i+=2;continue;}
      if(c==="↔"){tk.push({type:"EQV"});i++;continue;}
      if(c==="<"&&f[i+1]==="-"&&f[i+2]===">"){tk.push({type:"EQV"});i+=3;continue;}
      if(c==="("){tk.push({type:"LPAREN"});i++;continue;}
      if(c===")"){tk.push({type:"RPAREN"});i++;continue;}
      if(c==="0"||c==="1"){tk.push({type:"LIT",val:+c});i++;continue;}
      throw new Error(`Onbekend symbool: '${c}'`);
    }
    return tk;
  }
  function parse(tokens){
    let pos=0;
    const peek=()=>tokens[pos],consume=()=>tokens[pos++];
    function eqv(){let l=imp();while(peek()?.type==="EQV"){consume();const r=imp();l={type:"EQV",left:l,right:r,label:`(${l.label}↔${r.label})`};}return l;}
    function imp(){let l=or();while(peek()?.type==="IMP"){consume();const r=or();l={type:"IMP",left:l,right:r,label:`(${l.label}→${r.label})`};}return l;}
    function or(){let l=and();while(peek()?.type==="OR"){consume();const r=and();l={type:"OR",left:l,right:r,label:`(${l.label}∨${r.label})`};}return l;}
    function and(){let l=not();while(peek()?.type==="AND"){consume();const r=not();l={type:"AND",left:l,right:r,label:`(${l.label}∧${r.label})`};}return l;}
    function not(){if(peek()?.type==="NOT"){consume();const c=not();return{type:"NOT",child:c,label:`¬${c.label}`};}return atom();}
    function atom(){
      const t=peek();
      if(!t)throw new Error("Onverwacht einde");
      if(t.type==="VAR"){consume();return{type:"VAR",val:t.val,label:t.val};}
      if(t.type==="LIT"){consume();return{type:"LIT",val:t.val,label:String(t.val)};}
      if(t.type==="LPAREN"){consume();const e=eqv();if(peek()?.type!=="RPAREN")throw new Error("Sluitend haakje ) ontbreekt");consume();return e;}
      throw new Error(`Onverwacht: '${t.val||t.type}'`);
    }
    const r=eqv();if(pos<tokens.length)throw new Error("Onverwacht teken na formule");return r;
  }
  function collectSub(node,res=[],seen=new Set()){
    if(!node)return res;
    if(node.child)collectSub(node.child,res,seen);
    if(node.left)collectSub(node.left,res,seen);
    if(node.right)collectSub(node.right,res,seen);
    if(node.type!=="VAR"&&node.type!=="LIT"&&!seen.has(node.label)){seen.add(node.label);res.push(node);}
    return res;
  }
  function evaluate(node,env){
    switch(node.type){
      case"VAR":return env[node.val];case"LIT":return node.val;
      case"NOT":return evaluate(node.child,env)===1?0:1;
      case"AND":return evaluate(node.left,env)===1&&evaluate(node.right,env)===1?1:0;
      case"OR":return evaluate(node.left,env)===1||evaluate(node.right,env)===1?1:0;
      case"IMP":return evaluate(node.left,env)===0||evaluate(node.right,env)===1?1:0;
      case"EQV":return evaluate(node.left,env)===evaluate(node.right,env)?1:0;
    }
  }
  function extractVars(f){const v=new Set();for(const c of f)if(/[a-zA-Z]/.test(c))v.add(c);return[...v].sort();}

  let stepData=null,stepIndex=0;

  function solve(){
    hideError();
    const formula=inp.value.trim();if(!formula)return;
    let vars,subs,ast,table;
    try{
      ast=parse(tokenize(formula));
      vars=extractVars(formula);
      subs=collectSub(ast);
      const n=vars.length,rows=1<<n;
      table=[];
      for(let i=0;i<rows;i++){
        const env={};vars.forEach((v,idx)=>{env[v]=(i>>idx)&1;});
        const sv={};subs.forEach(s=>{sv[s.label]=evaluate(s,env);});
        table.push({env,sv,result:evaluate(ast,env)});
      }
    }catch(e){showError(e.message);return;}
    const rootLabel=ast.label;
    const inter=subs.filter(s=>s.label!==rootLabel);
    if(currentMode==='all'){
      renderFull(vars,inter,rootLabel,table);
      document.getElementById("stepNav").style.display='none';
    } else {
      stepData={vars,inter,rootLabel,table};stepIndex=0;
      renderStep(0);
      document.getElementById("stepNav").style.display='flex';
      updateStepInfo(table.length);
    }
    renderStats(table);
  }

  function renderFull(vars,inter,rootLabel,table){
    let h=`<div class="table-wrap"><table><thead><tr>`;
    vars.forEach(v=>{h+=`<th class="var-col">${v}</th>`;});
    inter.forEach((s,i)=>{h+=`<th class="sub-col${i===0?' divider-th':''}">${s.label}</th>`;});
    h+=`<th class="result-col">${rootLabel}</th></tr></thead><tbody>`;
    table.forEach(row=>{
      h+="<tr>";
      vars.forEach(v=>{h+=`<td class="${row.env[v]===1?'val-1':'val-0'}">${row.env[v]}</td>`;});
      inter.forEach((s,i)=>{const val=row.sv[s.label];h+=`<td class="${i===0?'divider-td':''} ${val===1?'val-1':'val-0'}">${val}</td>`;});
      h+=`<td class="result-td ${row.result===1?'val-1':'val-0'}">${row.result}</td></tr>`;
    });
    h+="</tbody></table></div>";
    document.getElementById("tableWrap").innerHTML=h;
  }

  function renderStep(step){
    if(!stepData)return;
    const{vars,inter,rootLabel,table}=stepData;
    let h=`<div class="table-wrap"><table><thead><tr>`;
    vars.forEach(v=>{h+=`<th class="var-col">${v}</th>`;});
    inter.forEach((s,i)=>{h+=`<th class="sub-col${i===0?' divider-th':''}">${s.label}</th>`;});
    h+=`<th class="result-col">${rootLabel}</th></tr></thead><tbody>`;
    table.forEach((row,r)=>{
      const active=r===step,shown=r<=step;
      if(!shown){
        h+="<tr>";
        vars.forEach(()=>{h+=`<td style="color:var(--text-muted);opacity:0.3">·</td>`;});
        inter.forEach((s,i)=>{h+=`<td class="${i===0?'divider-td':''}" style="color:var(--text-muted);opacity:0.3">·</td>`;});
        h+=`<td class="result-td" style="color:var(--text-muted);opacity:0.3">·</td></tr>`;
      } else {
        h+=`<tr class="${active?'step-row-highlight':''}">`;
        vars.forEach(v=>{const val=row.env[v];h+=`<td class="${active?'step-active-cell':''} ${val===1?'val-1':'val-0'}">${val}</td>`;});
        inter.forEach((s,i)=>{const val=row.sv[s.label];h+=`<td class="${i===0?'divider-td':''} ${val===1?'val-1':'val-0'}">${val}</td>`;});
        h+=`<td class="result-td ${row.result===1?'val-1':'val-0'}">${row.result}</td></tr>`;
      }
    });
    h+="</tbody></table></div>";
    document.getElementById("tableWrap").innerHTML=h;
  }

  function updateStepInfo(total){document.getElementById("stepInfo").textContent=`Rij ${Math.min(stepIndex+1,total)} van ${total}`;}
  function stepMove(dir){
    if(!stepData)return;
    stepIndex=Math.max(0,Math.min(stepIndex+dir,stepData.table.length-1));
    renderStep(stepIndex);updateStepInfo(stepData.table.length);
  }

  function renderStats(table){
    const ones=table.filter(r=>r.result===1).length,total=table.length;
    const type=ones===total?"tautologie":ones===0?"contradictie":"contingentie";
    const cls=type==="tautologie"?"taut":type==="contradictie"?"contra":"conting";
    document.getElementById("stats").innerHTML=`
      <div class="stat"><div class="stat-label">Rijen</div><div class="stat-val">${total}</div></div>
      <div class="stat"><div class="stat-label">Uitkomst 1</div><div class="stat-val taut">${ones}</div></div>
      <div class="stat"><div class="stat-label">Uitkomst 0</div><div class="stat-val contra">${total-ones}</div></div>
      <div class="stat"><div class="stat-label">Type</div><div class="stat-val ${cls}" style="text-transform:capitalize">${type}</div></div>`;
  }

  // Generator
  function selectType(el){
    document.querySelectorAll('#type-chips .gen-chip').forEach(b=>b.classList.remove('selected'));
    el.classList.add('selected');
  }
  function toggleOp(el){
    const allOps=[...document.querySelectorAll('#op-chips .gen-chip')];
    const selBin=allOps.filter(b=>b.classList.contains('selected')&&b.dataset.op!=='¬');
    if(el.classList.contains('selected')){
      if(el.dataset.op!=='¬'&&selBin.length<=1)return; // need at least one binary op
      el.classList.remove('selected');
    } else {
      el.classList.add('selected');
    }
  }

  const ALL_VARS='pqrstuvwxyzabcdefghijklmno'.split('');
  function updateVarPreview(){
    let n=parseInt(document.getElementById('varCount').value)||2;
    n=Math.max(1,Math.min(n,ALL_VARS.length));
    document.getElementById('varPreview').textContent='Gebruikt: '+ALL_VARS.slice(0,n).join(', ');
  }
  updateVarPreview();

  function evalType(f){
    try{
      const ast=parse(tokenize(f));
      const vars=[...new Set(f.split('').filter(c=>/[a-zA-Z]/.test(c)))].sort();
      const n=vars.length,rows=1<<n;let ones=0;
      for(let i=0;i<rows;i++){const env={};vars.forEach((v,idx)=>{env[v]=(i>>idx)&1;});if(evaluate(ast,env)===1)ones++;}
      if(ones===rows)return'tautologie';if(ones===0)return'contradictie';return'contingentie';
    }catch{return null;}
  }

  function buildRand(vars,ops,depth){
    const binOps=ops.filter(o=>o!=='¬'),useNeg=ops.includes('¬');
    if(depth<=0||Math.random()<0.32){
      let v=vars[Math.floor(Math.random()*vars.length)];
      if(useNeg&&Math.random()<0.35)v='¬'+v;
      return v;
    }
    const op=binOps[Math.floor(Math.random()*binOps.length)];
    const l=buildRand(vars,ops,depth-1),r=buildRand(vars,ops,depth-1);
    let f=`(${l}${op}${r})`;
    if(useNeg&&Math.random()<0.15)f='¬'+f;
    return f;
  }

  function fallbackTaut(v,ops){
    if(ops.includes('∨')&&ops.includes('¬'))return`(${v}∨¬${v})`;
    if(ops.includes('→'))return`(${v}→${v})`;
    if(ops.includes('↔'))return`(${v}↔${v})`;
    return`(${v}∨${v})`;
  }
  function fallbackCont(v,ops){
    if(ops.includes('∧')&&ops.includes('¬'))return`(${v}∧¬${v})`;
    return`(${v}∧${v})`;
  }

  function generateFormula(){
    const typeChip=document.querySelector('#type-chips .gen-chip.selected');
    const genType=typeChip?typeChip.dataset.type:'tautologie';
    let n=parseInt(document.getElementById('varCount').value)||2;
    n=Math.max(1,Math.min(n,ALL_VARS.length));
    const vars=ALL_VARS.slice(0,n);
    const ops=[...document.querySelectorAll('#op-chips .gen-chip.selected')].map(b=>b.dataset.op);
    const binOps=ops.filter(o=>o!=='¬');
    const el=document.getElementById("genFormula");
    const resDiv=document.getElementById("genResult");
    [...resDiv.querySelectorAll('button')].forEach(b=>b.remove());
    if(binOps.length===0){
      el.style.fontFamily="'DM Sans',sans-serif";el.style.color='var(--error-border)';
      el.textContent='⚠ Kies minstens één binair connectief.';return;
    }
    el.style.fontFamily="'DM Sans',monospace";
    el.style.color='var(--text-muted)';el.textContent='Genereren...';

    // depth scales with var count so formulas look like textbook ones
    const depth=Math.max(2,Math.min(n+1,6));
    let found=null;
    for(let a=0;a<1500&&!found;a++){
      let f;
      if(genType==='tautologie'&&a<40)f=buildRand(vars,ops,depth);
      else if(genType==='contradictie'&&a<40)f=buildRand(vars,ops,depth);
      else f=buildRand(vars,ops,depth);
      if(f&&evalType(f)===genType)found=f;
    }
    if(!found){
      const v=vars[0];
      if(genType==='tautologie')found=fallbackTaut(v,ops);
      else if(genType==='contradictie')found=fallbackCont(v,ops);
      else found=vars.length>1?`(${vars[0]}→${vars[1]})`:vars[0];
    }

    el.style.color='var(--accent)';el.textContent=found;

    const useBtn=document.createElement('button');useBtn.className='gen-use-btn';useBtn.textContent='Gebruik →';
    useBtn.onclick=()=>{document.querySelector('.tab[onclick*="solve"]').click();inp.value=found;inp.focus();};
    const copyBtn=document.createElement('button');copyBtn.className='copy-btn';copyBtn.textContent='Kopieer';
    copyBtn.onclick=()=>{navigator.clipboard.writeText(found).then(()=>{copyBtn.textContent='✓';setTimeout(()=>copyBtn.textContent='Kopieer',1500);});};
    resDiv.appendChild(useBtn);resDiv.appendChild(copyBtn);
  }
</script>
</body>
