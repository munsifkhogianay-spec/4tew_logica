<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logica</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f5f0ff;--surface:#fff;--surface2:#ede7ff;--border:#d8cef7;--accent:#8b5cf6;--accent2:#f472b6;--text:#2d1b69;--text-muted:#9381c0;--val-1:#059669;--val-0:#e11d48;--result-bg:#f0ebff;--error-bg:#fff0f4;--error-border:#f472b6;--shadow:0 4px 24px rgba(139,92,246,0.10);}
    body.dark{--bg:#13101f;--surface:#1e1830;--surface2:#2a2245;--border:#3a2f5e;--text:#e9e2ff;--text-muted:#7c6aaa;--result-bg:#1c1535;--error-bg:#2a0f1f;--shadow:0 4px 24px rgba(0,0,0,0.35);}
    [data-theme="mint"]{--bg:#f0fdf8;--surface:#fff;--surface2:#d1fae5;--border:#a7f3d0;--accent:#10b981;--accent2:#3b82f6;--text:#064e3b;--text-muted:#34d399;--result-bg:#ecfdf5;}
    [data-theme="peach"]{--bg:#fff7ed;--surface:#fff;--surface2:#ffe4cc;--border:#fdba74;--accent:#f97316;--accent2:#ec4899;--text:#7c2d12;--text-muted:#fb923c;--result-bg:#fff3e8;}
    [data-theme="sky"]{--bg:#f0f9ff;--surface:#fff;--surface2:#dbeafe;--border:#93c5fd;--accent:#3b82f6;--accent2:#8b5cf6;--text:#1e3a5f;--text-muted:#60a5fa;--result-bg:#eff6ff;}
    body.dark[data-theme="mint"]{--bg:#081a13;--surface:#0f2a1e;--surface2:#153d2b;--border:#1f5c3f;--text:#d1fae5;--text-muted:#34d399;--result-bg:#0d2319;}
    body.dark[data-theme="peach"]{--bg:#1a0f07;--surface:#2a180a;--surface2:#3d2210;--border:#6b3a15;--text:#fff0e0;--text-muted:#fb923c;--result-bg:#221208;}
    body.dark[data-theme="sky"]{--bg:#08101f;--surface:#0f1e35;--surface2:#162d4f;--border:#1e3f6e;--text:#dbeafe;--text-muted:#60a5fa;--result-bg:#0c1828;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;padding:32px 20px;min-height:100vh;transition:background 0.3s,color 0.3s;}
    .top-bar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
    h1{font-family:'Fraunces',serif;font-size:2.4rem;font-weight:700;color:var(--accent);letter-spacing:-1px;line-height:1;}
    h1 span{font-style:italic;font-weight:400;color:var(--accent2);}
    .subtitle{font-size:0.72rem;color:var(--text-muted);margin-top:5px;letter-spacing:1.5px;text-transform:uppercase;}
    .controls{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
    .theme-switcher{display:flex;gap:8px;align-items:center;}
    .theme-switcher span{font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-right:2px;}
    .dark-toggle{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;}
    .dark-toggle span{font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
    .toggle-track{width:38px;height:20px;background:var(--border);border-radius:99px;position:relative;transition:background 0.25s;}
    body.dark .toggle-track{background:var(--accent);}
    .toggle-thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform 0.25s;box-shadow:0 1px 4px rgba(0,0,0,0.2);}
    body.dark .toggle-thumb{transform:translateX(18px);}
    .theme-dot{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform 0.15s,border-color 0.15s;}
    .theme-dot:hover{transform:scale(1.2);}
    .theme-dot.active{border-color:var(--text);}
    .theme-dot[data-t="default"]{background:linear-gradient(135deg,#8b5cf6,#f472b6);}
    .theme-dot[data-t="mint"]{background:linear-gradient(135deg,#10b981,#3b82f6);}
    .theme-dot[data-t="peach"]{background:linear-gradient(135deg,#f97316,#ec4899);}
    .theme-dot[data-t="sky"]{background:linear-gradient(135deg,#3b82f6,#8b5cf6);}
    .tabs{display:flex;margin-bottom:20px;border:2px solid var(--accent);border-radius:14px;overflow:hidden;background:var(--surface);}
    .tab{flex:1;padding:10px 0;text-align:center;cursor:pointer;font-weight:700;font-size:0.85rem;color:var(--accent);background:transparent;border:none;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
    .tab.active{background:var(--accent);color:#fff;}
    .tab:not(.active):hover{background:var(--surface2);}
    .symbols{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
    .sym-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;color:var(--accent);font-size:1rem;padding:6px 12px;cursor:pointer;transition:all 0.15s;}
    .sym-btn:hover{background:var(--surface2);border-color:var(--accent);transform:translateY(-1px);}
    .sym-label{font-size:0.6rem;color:var(--text-muted);display:block;text-align:center;margin-top:1px;}
    .hint{font-size:0.72rem;color:var(--text-muted);margin-bottom:14px;line-height:1.7;}
    .hint span{color:var(--accent);font-weight:600;}
    .mode-row{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
    .mode-label{font-size:0.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
    .mode-btn{background:var(--surface);border:2px solid var(--accent);border-radius:10px;color:var(--accent);font-size:0.8rem;padding:6px 14px;cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;font-weight:600;}
    .mode-btn.active{background:var(--accent);color:#fff;}
    .input-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
    .formula-input{flex:1;min-width:200px;background:var(--surface);border:2px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',monospace;font-size:1rem;padding:10px 16px;outline:none;transition:border-color 0.2s;}
    .formula-input:focus{border-color:var(--accent);}
    .formula-input.error{border-color:var(--error-border);}
    .formula-input::placeholder{color:var(--text-muted);opacity:0.7;}
    .btn{background:var(--accent);border:2px solid var(--accent);border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-weight:700;font-size:0.9rem;padding:10px 22px;cursor:pointer;transition:opacity 0.2s,transform 0.1s;}
    .btn:hover{opacity:0.85;transform:translateY(-1px);}
    .btn-outline{background:var(--surface);border:2px solid var(--accent);color:var(--accent);font-weight:600;}
    .btn-outline:hover{background:var(--surface2);}
    .error-msg{color:var(--error-border);font-size:0.78rem;margin-bottom:12px;padding:10px 14px;background:var(--error-bg);border-radius:10px;border-left:3px solid var(--error-border);}
    .table-wrap{overflow-x:auto;border-radius:16px;border:1.5px solid var(--border);margin-top:16px;box-shadow:var(--shadow);background:var(--surface);}
    table{border-collapse:collapse;font-size:0.83rem;width:100%;}
    thead tr{background:var(--surface2);}
    th{padding:10px 16px;text-align:center;font-weight:700;border-bottom:2px solid var(--border);white-space:nowrap;border-right:1px solid var(--border);color:var(--text);}
    th:last-child{border-right:none;}
    th.var-col{color:var(--accent2);}
    th.sub-col{color:var(--text-muted);font-size:0.75rem;font-weight:500;}
    th.result-col{color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,var(--surface2));}
    td{padding:9px 16px;text-align:center;border-bottom:1px solid var(--border);border-right:1px solid var(--border);background:var(--surface);}
    td:last-child{border-right:none;}
    tr:last-child td{border-bottom:none;}
    tr:nth-child(even) td{background:color-mix(in srgb,var(--bg) 60%,var(--surface));}
    tr:hover td{background:var(--surface2)!important;}
    .val-0{color:var(--val-0);font-weight:700;}
    .val-1{color:var(--val-1);font-weight:700;}
    .result-td{background:var(--result-bg)!important;border-left:2px solid color-mix(in srgb,var(--accent) 30%,transparent)!important;}
    tr:hover .result-td{background:color-mix(in srgb,var(--accent) 12%,var(--surface))!important;}
    .divider-th{border-left:2px solid var(--border)!important;}
    .divider-td{border-left:2px solid var(--border)!important;}
    .stats{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
    .stat{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:10px 16px;font-size:0.75rem;box-shadow:var(--shadow);min-width:70px;}
    .stat-label{color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-size:0.63rem;}
    .stat-val{font-size:1.05rem;font-weight:700;margin-top:3px;color:var(--text);}
    .taut{color:#059669;}.contra{color:#e11d48;}.conting{color:#d97706;}
    .gen-panel{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:24px;box-shadow:var(--shadow);}
    .gen-row{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:18px;}
    .gen-label{font-size:0.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;min-width:110px;padding-top:7px;}
    .gen-chips{display:flex;gap:7px;flex-wrap:wrap;}
    .gen-chip{background:var(--surface);border:2px solid var(--accent);border-radius:10px;color:var(--accent);font-size:0.82rem;padding:6px 14px;cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;font-weight:600;display:flex;align-items:center;gap:5px;}
    .gen-chip:hover{background:var(--surface2);}
    .gen-chip.selected{background:var(--accent);color:#fff;}
    .gen-chip .ck{font-size:0.8rem;display:none;}
    .gen-chip.selected .ck{display:inline;}
    .var-input{background:var(--surface);border:2px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;padding:6px 12px;outline:none;width:72px;transition:border-color 0.2s;}
    .var-input:focus{border-color:var(--accent);}
    .var-preview{font-size:0.75rem;color:var(--text-muted);padding-top:6px;font-style:italic;}
    .section-head{font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:18px;}
    .gen-result{background:var(--surface2);border:2px solid var(--accent);border-radius:14px;padding:14px 18px;margin-top:18px;font-size:1.05rem;color:var(--accent);word-break:break-all;min-height:54px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-family:'DM Sans',monospace;}
    .gen-result span{flex:1;}
    .copy-btn{background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:0.78rem;padding:6px 14px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;font-weight:700;}
    .copy-btn:hover{opacity:0.85;}
    .gen-use-btn{background:var(--surface);border:2px solid var(--accent);border-radius:8px;color:var(--accent);font-size:0.78rem;padding:6px 14px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;font-weight:700;}
    .gen-use-btn:hover{background:var(--surface2);}
  </style>
</head>
<body class="dark">
<div class="top-bar">
  <div>
    <h1>Logica<span>.</span></h1>
    <div class="subtitle">Logische uitspraken · Waarheidstabellen · Stap voor stap</div>
  </div>
  <div class="controls">
    <div class="theme-switcher">
      <span>Kleur</span>
      <div class="theme-dot active" data-t="default" onclick="setTheme('default',this)"></div>
      <div class="theme-dot" data-t="mint"  onclick="setTheme('mint',this)"></div>
      <div class="theme-dot" data-t="peach" onclick="setTheme('peach',this)"></div>
      <div class="theme-dot" data-t="sky"   onclick="setTheme('sky',this)"></div>
    </div>
    <div class="dark-toggle" onclick="toggleDark()">
      <span id="darkLabel">Donker</span>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" id="tabSolve" onclick="switchTab('solve')">🔍 Oplossen</button>
  <button class="tab"        id="tabGen"   onclick="switchTab('gen')">⚡ Generator</button>
</div>

<div id="tab-solve">
  <div class="symbols" id="symbols"></div>
  <div class="hint">
    Typ variabelen als letters: <span>p, q, r, ...</span> &nbsp;|&nbsp;
    <span>&amp; = ∧</span>, <span>| = ∨</span>, <span>~ = ¬</span>,
    <span>-&gt; = →</span>, <span>&lt;-&gt; = ↔</span>
  </div>
  <div class="mode-row">
    <span class="mode-label">Modus:</span>
    <button class="mode-btn active" id="modeAll"  onclick="setMode('all')">Alleen eindresultaat</button>
    <button class="mode-btn"        id="modeStep" onclick="setMode('step')">Stap voor stap</button>
  </div>
  <div class="input-row">
    <input id="formulaInput" class="formula-input" placeholder="bijv.  p∨¬p" />
    <button class="btn"             onclick="solve()">Oplossen</button>
    <button class="btn btn-outline" onclick="clearAll()">Wis</button>
  </div>
  <div id="errorMsg" class="error-msg" style="display:none"></div>
  <div id="tableWrap"></div>
  <div id="stats" class="stats"></div>
</div>

<div id="tab-gen" style="display:none">
  <div class="gen-panel">
    <div class="section-head">Formule generator</div>
    <div class="gen-row">
      <span class="gen-label">Type</span>
      <div class="gen-chips" id="type-chips">
        <button class="gen-chip"          data-type="tautologie"   onclick="selectType(this)"><span class="ck">✓</span> Tautologie</button>
        <button class="gen-chip"          data-type="contradictie" onclick="selectType(this)"><span class="ck">✓</span> Contradictie</button>
        <button class="gen-chip selected" data-type="contingentie" onclick="selectType(this)"><span class="ck">✓</span> Contingentie</button>
      </div>
    </div>
    <div class="gen-row">
      <span class="gen-label">Variabelen</span>
      <div>
        <input type="number" class="var-input" id="varCount" min="1" max="8" value="2" oninput="updateVarPreview()">
        <div class="var-preview" id="varPreview">Gebruikt: p, q</div>
      </div>
    </div>
    <div class="gen-row">
      <span class="gen-label">Connectieven</span>
      <div class="gen-chips" id="op-chips">
        <button class="gen-chip selected" data-op="AND" onclick="toggleOp(this)"><span class="ck">✓</span> ∧ AND</button>
        <button class="gen-chip selected" data-op="OR"  onclick="toggleOp(this)"><span class="ck">✓</span> ∨ OR</button>
        <button class="gen-chip selected" data-op="IMP" onclick="toggleOp(this)"><span class="ck">✓</span> → IMP</button>
        <button class="gen-chip selected" data-op="EQV" onclick="toggleOp(this)"><span class="ck">✓</span> ↔ EQV</button>
        <button class="gen-chip selected" data-op="NOT" onclick="toggleOp(this)"><span class="ck">✓</span> ¬ NOT</button>
      </div>
    </div>
    <button class="btn" onclick="generateFormula()">Genereer formule</button>
    <div class="gen-result" id="genResult">
      <span id="genFormula" style="color:var(--text-muted);font-size:0.88rem;font-family:'DM Sans',sans-serif;font-weight:400">Klik op "Genereer formule" om te beginnen...</span>
    </div>
  </div>
</div>

<script>
// ── Theme ──
function setTheme(t,el){document.body.setAttribute('data-theme',t==='default'?'':t);document.querySelectorAll('.theme-dot').forEach(function(d){d.classList.remove('active');});el.classList.add('active');}
function toggleDark(){var d=document.body.classList.toggle('dark');document.getElementById('darkLabel').textContent=d?'Donker':'Licht';}
function switchTab(name){document.getElementById('tabSolve').classList.toggle('active',name==='solve');document.getElementById('tabGen').classList.toggle('active',name==='gen');document.getElementById('tab-solve').style.display=name==='solve'?'':'none';document.getElementById('tab-gen').style.display=name==='gen'?'':'none';}

// ── Mode ──
var currentMode='all';
function setMode(m){currentMode=m;document.getElementById('modeAll').classList.toggle('active',m==='all');document.getElementById('modeStep').classList.toggle('active',m==='step');}

// ── Symbols ──
var SYMS=[{s:'¬',l:'NOT'},{s:'∧',l:'AND'},{s:'∨',l:'OR'},{s:'→',l:'IMP'},{s:'↔',l:'EQV'},{s:'(',l:''},{s:')',l:''}];
var inp=document.getElementById('formulaInput');
SYMS.forEach(function(sym){
  var b=document.createElement('button');b.className='sym-btn';
  b.innerHTML=sym.s+(sym.l?'<span class="sym-label">'+sym.l+'</span>':'');
  b.onclick=function(){var st=inp.selectionStart,en=inp.selectionEnd;inp.value=inp.value.slice(0,st)+sym.s+inp.value.slice(en);inp.focus();inp.setSelectionRange(st+sym.s.length,st+sym.s.length);};
  document.getElementById('symbols').appendChild(b);
});
inp.addEventListener('keydown',function(e){if(e.key==='Enter')solve();});

function showError(msg){var el=document.getElementById('errorMsg');el.textContent='⚠ '+msg;el.style.display='block';inp.classList.add('error');}
function hideError(){document.getElementById('errorMsg').style.display='none';inp.classList.remove('error');}
function clearAll(){inp.value='';hideError();document.getElementById('tableWrap').innerHTML='';document.getElementById('stats').innerHTML='';}

// ── Tokenizer ──
function tokenize(f){
  var tk=[],i=0;
  while(i<f.length){
    var c=f[i];
    if(/\s/.test(c)){i++;continue;}
    if(/[a-zA-Z]/.test(c)){tk.push({type:'VAR',val:c.toLowerCase()});i++;continue;}
    if(c==='¬'||c==='~'||c==='!'){tk.push({type:'NOT'});i++;continue;}
    if(c==='∧'||c==='&'){tk.push({type:'AND'});i++;continue;}
    if(c==='∨'||c==='|'){tk.push({type:'OR'});i++;continue;}
    if(c==='→'){tk.push({type:'IMP'});i++;continue;}
    if(c==='-'&&f[i+1]==='>'){tk.push({type:'IMP'});i+=2;continue;}
    if(c==='↔'){tk.push({type:'EQV'});i++;continue;}
    if(c==='<'&&f[i+1]==='-'&&f[i+2]==='>'){tk.push({type:'EQV'});i+=3;continue;}
    if(c==='('){tk.push({type:'LPAREN'});i++;continue;}
    if(c===')'){tk.push({type:'RPAREN'});i++;continue;}
    if(c==='0'||c==='1'){tk.push({type:'LIT',val:+c});i++;continue;}
    throw new Error("Onbekend symbool: '"+c+"'");
  }
  return tk;
}

// ── Parser ──
function parse(tokens){
  var pos=0;
  function peek(){return tokens[pos];}
  function consume(){return tokens[pos++];}
  function eqv(){var l=imp();while(peek()&&peek().type==='EQV'){consume();var r=imp();l={type:'EQV',left:l,right:r,label:'('+l.label+'↔'+r.label+')'};} return l;}
  function imp(){var l=or();while(peek()&&peek().type==='IMP'){consume();var r=or();l={type:'IMP',left:l,right:r,label:'('+l.label+'→'+r.label+')'};} return l;}
  function or(){var l=and();while(peek()&&peek().type==='OR'){consume();var r=and();l={type:'OR',left:l,right:r,label:'('+l.label+'∨'+r.label+')'};} return l;}
  function and(){var l=not();while(peek()&&peek().type==='AND'){consume();var r=not();l={type:'AND',left:l,right:r,label:'('+l.label+'∧'+r.label+')'};} return l;}
  function not(){if(peek()&&peek().type==='NOT'){consume();var c=not();return{type:'NOT',child:c,label:'¬'+c.label};} return atom();}
  function atom(){
    var t=peek();
    if(!t)throw new Error('Onverwacht einde van formule');
    if(t.type==='VAR'){consume();return{type:'VAR',val:t.val,label:t.val};}
    if(t.type==='LIT'){consume();return{type:'LIT',val:t.val,label:''+t.val};}
    if(t.type==='LPAREN'){consume();var e=eqv();if(!peek()||peek().type!=='RPAREN')throw new Error('Sluitend haakje ) ontbreekt');consume();return e;}
    throw new Error("Onverwacht teken: '"+(t.val||t.type)+"'");
  }
  var result=eqv();
  if(pos<tokens.length)throw new Error('Onverwacht teken na formule');
  return result;
}

// ── Collect subformulas bottom-up ──
function collectSub(node,res,seen){
  if(!res)res=[];if(!seen)seen={};
  if(!node)return res;
  if(node.child)collectSub(node.child,res,seen);
  if(node.left) collectSub(node.left,res,seen);
  if(node.right)collectSub(node.right,res,seen);
  if(node.type!=='VAR'&&node.type!=='LIT'&&!seen[node.label]){seen[node.label]=true;res.push(node);}
  return res;
}

// ── Evaluate ──
function evaluate(node,env){
  if(node.type==='VAR')return env[node.val];
  if(node.type==='LIT')return node.val;
  if(node.type==='NOT')return evaluate(node.child,env)===1?0:1;
  if(node.type==='AND')return(evaluate(node.left,env)===1&&evaluate(node.right,env)===1)?1:0;
  if(node.type==='OR') return(evaluate(node.left,env)===1||evaluate(node.right,env)===1)?1:0;
  if(node.type==='IMP')return(evaluate(node.left,env)===0||evaluate(node.right,env)===1)?1:0;
  if(node.type==='EQV')return evaluate(node.left,env)===evaluate(node.right,env)?1:0;
}

// ── Extract vars in alphabetical order ──
function extractVars(f){
  var seen={},vars=[];
  for(var i=0;i<f.length;i++){
    var c=f[i].toLowerCase();
    if(/[a-z]/.test(c)&&!seen[c]){seen[c]=true;vars.push(c);}
  }
  // Sort alphabetically so p < q < r < s ...
  vars.sort();
  return vars;
}

// ── Build truth table
// Row ordering: p is FASTEST changing (LSB), last var is SLOWEST (MSB)
// So for vars=[p,q,r], row i gives:
//   p = bit 0 of i, q = bit 1, r = bit 2
// Row 0: p=0,q=0,r=0 → Row 1: p=1,q=0,r=0 → Row 2: p=0,q=1,r=0 ...
function buildTable(ast,vars){
  var subs=collectSub(ast),n=vars.length,rows=1<<n,table=[];
  for(var i=0;i<rows;i++){
    var env={};
    for(var vi=0;vi<n;vi++){
      // vars[0]=p is LSB (fastest), vars[n-1] is MSB (slowest)
      env[vars[vi]]=(i>>vi)&1;
    }
    var sv={};
    for(var si=0;si<subs.length;si++)sv[subs[si].label]=evaluate(subs[si],env);
    table.push({env:env,sv:sv,result:evaluate(ast,env)});
  }
  return{subs:subs,table:table};
}

// ── Solver ──
function solve(){
  hideError();
  document.getElementById('tableWrap').innerHTML='';
  document.getElementById('stats').innerHTML='';
  var formula=inp.value.trim();
  if(!formula)return;
  var ast,vars,subs,table;
  try{
    ast=parse(tokenize(formula));
    vars=extractVars(formula);
    if(vars.length>8)throw new Error('Maximaal 8 variabelen toegestaan.');
    var built=buildTable(ast,vars);
    subs=built.subs;table=built.table;
  }catch(e){showError(e.message);return;}

  var rootLabel=ast.label;
  var inter=subs.filter(function(s){return s.label!==rootLabel;});

  if(currentMode==='all'){
    renderAll(vars,rootLabel,table);
  } else {
    renderStep(vars,inter,rootLabel,table);
  }
  renderStats(table);
}

// ── Alleen eindresultaat ──
function renderAll(vars,rootLabel,table){
  var h='<div class="table-wrap"><table><thead><tr>';
  for(var i=0;i<vars.length;i++)h+='<th class="var-col">'+vars[i]+'</th>';
  h+='<th class="result-col divider-th">'+rootLabel+'</th>';
  h+='</tr></thead><tbody>';
  for(var r=0;r<table.length;r++){
    var row=table[r];
    h+='<tr>';
    for(var i=0;i<vars.length;i++){var v=row.env[vars[i]];h+='<td class="'+(v===1?'val-1':'val-0')+'">'+v+'</td>';}
    var res=row.result;
    h+='<td class="result-td divider-td '+(res===1?'val-1':'val-0')+'">'+res+'</td>';
    h+='</tr>';
  }
  h+='</tbody></table></div>';
  document.getElementById('tableWrap').innerHTML=h;
}

// ── Stap voor stap ──
function renderStep(vars,inter,rootLabel,table){
  var h='<div class="table-wrap"><table><thead><tr>';
  for(var i=0;i<vars.length;i++)h+='<th class="var-col">'+vars[i]+'</th>';
  for(var j=0;j<inter.length;j++)h+='<th class="sub-col'+(j===0?' divider-th':'')+'">'+inter[j].label+'</th>';
  h+='<th class="result-col'+(inter.length===0?' divider-th':'')+'">'+rootLabel+'</th>';
  h+='</tr></thead><tbody>';
  for(var r=0;r<table.length;r++){
    var row=table[r];
    h+='<tr>';
    for(var i=0;i<vars.length;i++){var v=row.env[vars[i]];h+='<td class="'+(v===1?'val-1':'val-0')+'">'+v+'</td>';}
    for(var j=0;j<inter.length;j++){var sv=row.sv[inter[j].label];h+='<td class="'+(j===0?'divider-td ':'')+''+(sv===1?'val-1':'val-0')+'">'+sv+'</td>';}
    var res=row.result;
    h+='<td class="result-td '+(inter.length===0?'divider-td ':'')+''+(res===1?'val-1':'val-0')+'">'+res+'</td>';
    h+='</tr>';
  }
  h+='</tbody></table></div>';
  document.getElementById('tableWrap').innerHTML=h;
}

function renderStats(table){
  var ones=0;for(var i=0;i<table.length;i++)if(table[i].result===1)ones++;
  var total=table.length,type=ones===total?'tautologie':ones===0?'contradictie':'contingentie';
  var cls=type==='tautologie'?'taut':type==='contradictie'?'contra':'conting';
  document.getElementById('stats').innerHTML=
    '<div class="stat"><div class="stat-label">Rijen</div><div class="stat-val">'+total+'</div></div>'+
    '<div class="stat"><div class="stat-label">Uitkomst 1</div><div class="stat-val taut">'+ones+'</div></div>'+
    '<div class="stat"><div class="stat-label">Uitkomst 0</div><div class="stat-val contra">'+(total-ones)+'</div></div>'+
    '<div class="stat"><div class="stat-label">Type</div><div class="stat-val '+cls+'" style="text-transform:capitalize">'+type+'</div></div>';
}

// ── Generator ──
// Standard ordered var list for generator
var ALL_VARS='pqrstuvwxyzabcdefghijklmno'.split('');

function selectType(el){document.querySelectorAll('#type-chips .gen-chip').forEach(function(b){b.classList.remove('selected');});el.classList.add('selected');}
function toggleOp(el){
  var selBin=Array.from(document.querySelectorAll('#op-chips .gen-chip.selected')).filter(function(b){return b.dataset.op!=='NOT';});
  if(el.classList.contains('selected')){if(el.dataset.op!=='NOT'&&selBin.length<=1)return;el.classList.remove('selected');}
  else el.classList.add('selected');
}
function updateVarPreview(){var n=parseInt(document.getElementById('varCount').value)||2;n=Math.max(1,Math.min(n,8));document.getElementById('varPreview').textContent='Gebruikt: '+ALL_VARS.slice(0,n).join(', ');}
updateVarPreview();

function evalType(f,vars){
  try{
    var ast=parse(tokenize(f)),n=vars.length,rows=1<<n,ones=0;
    for(var i=0;i<rows;i++){var env={};for(var vi=0;vi<vars.length;vi++)env[vars[vi]]=(i>>vi)&1;if(evaluate(ast,env)===1)ones++;}
    if(ones===rows)return'tautologie';if(ones===0)return'contradictie';return'contingentie';
  }catch(e){return null;}
}

// ── Smarter generator: uses structured templates for taut/contra, random for contingent ──
function opSym(op){return{AND:'∧',OR:'∨',IMP:'→',EQV:'↔'}[op];}

// Random binary op from allowed list
function randBinOp(binOps){return binOps[Math.floor(Math.random()*binOps.length)];}

// Build a random formula of given depth, biasing toward using all vars
function buildRand(vars,ops,depth,usedVars){
  var binOps=ops.filter(function(o){return o!=='NOT';});
  var useNeg=ops.indexOf('NOT')>=0;
  // Leaf: pick an unused var first, then random
  if(depth<=0||Math.random()<0.25){
    var v;
    // prefer vars not yet used
    var unused=vars.filter(function(x){return!usedVars[x];});
    if(unused.length>0&&Math.random()<0.7){v=unused[Math.floor(Math.random()*unused.length)];}
    else{v=vars[Math.floor(Math.random()*vars.length)];}
    usedVars[v]=true;
    return(useNeg&&Math.random()<0.3)?'¬'+v:v;
  }
  var op=randBinOp(binOps);
  var left=buildRand(vars,ops,depth-1,usedVars);
  var right=buildRand(vars,ops,depth-1,usedVars);
  var f='('+left+opSym(op)+right+')';
  if(useNeg&&Math.random()<0.1)f='¬'+f;
  return f;
}

// Build guaranteed tautology using available ops
function buildTaut(vars,ops){
  var v=vars[Math.floor(Math.random()*vars.length)];
  var binOps=ops.filter(function(o){return o!=='NOT';});
  var useNeg=ops.indexOf('NOT')>=0;
  // Strategy pool: pick one randomly
  var strategies=[];
  if(useNeg&&ops.indexOf('OR')>=0)  strategies.push(function(){return'('+v+'∨¬'+v+')';});
  if(ops.indexOf('IMP')>=0)          strategies.push(function(){return'('+v+'→'+v+')';});
  if(ops.indexOf('EQV')>=0)          strategies.push(function(){return'('+v+'↔'+v+')';});
  if(useNeg&&ops.indexOf('IMP')>=0)  strategies.push(function(){return'(¬'+v+'→'+v+')→'+v;});
  if(ops.indexOf('IMP')>=0&&vars.length>=2){
    var w=vars.filter(function(x){return x!==v;})[0];
    strategies.push(function(){return'(('+v+'→'+w+')→(('+w+'→'+v+')→'+v+'))';});
    strategies.push(function(){return'('+v+'→('+w+'→'+v+'))';});
  }
  if(ops.indexOf('IMP')>=0&&useNeg){
    strategies.push(function(){return'(¬¬'+v+'→'+v+')';});
    strategies.push(function(){return'('+v+'→¬¬'+v+')';});
  }
  if(useNeg&&ops.indexOf('AND')>=0&&ops.indexOf('IMP')>=0){
    strategies.push(function(){return'(('+v+'∧¬'+v+')→'+v+')';});
  }
  if(strategies.length===0){
    // absolute fallback
    if(useNeg)return'('+v+'∨¬'+v+')';
    return'('+v+'→'+v+')';
  }
  return strategies[Math.floor(Math.random()*strategies.length)]();
}

// Build guaranteed contradiction using available ops
function buildContra(vars,ops){
  var v=vars[Math.floor(Math.random()*vars.length)];
  var useNeg=ops.indexOf('NOT')>=0;
  var strategies=[];
  if(useNeg&&ops.indexOf('AND')>=0) strategies.push(function(){return'('+v+'∧¬'+v+')';});
  if(useNeg&&ops.indexOf('EQV')>=0) strategies.push(function(){return'('+v+'↔¬'+v+')';});
  if(useNeg&&ops.indexOf('AND')>=0) strategies.push(function(){return'¬('+v+'∨¬'+v+')';});
  if(strategies.length===0){
    if(useNeg)return'('+v+'∧¬'+v+')';
    // no negation: wrap a tautology in NOT
    return'¬('+v+'→'+v+')';
  }
  return strategies[Math.floor(Math.random()*strategies.length)]();
}

function generateFormula(){
  var typeChip=document.querySelector('#type-chips .gen-chip.selected');
  var genType=typeChip?typeChip.dataset.type:'tautologie';
  var n=parseInt(document.getElementById('varCount').value)||2;n=Math.max(1,Math.min(n,8));
  var vars=ALL_VARS.slice(0,n);
  var ops=Array.from(document.querySelectorAll('#op-chips .gen-chip.selected')).map(function(b){return b.dataset.op;});
  var binOps=ops.filter(function(o){return o!=='NOT';});
  var el=document.getElementById('genFormula'),resDiv=document.getElementById('genResult');
  Array.from(resDiv.querySelectorAll('button')).forEach(function(b){b.remove();});
  if(binOps.length===0){el.style.fontFamily="'DM Sans',sans-serif";el.style.color='var(--error-border)';el.textContent='⚠ Kies minstens één binair connectief.';return;}
  el.style.fontFamily="'DM Sans',monospace";el.style.color='var(--text-muted)';el.textContent='Genereren...';

  var found=null;

  if(genType==='tautologie'){
    // Try structured first, then validate; fallback to random search
    for(var a=0;a<20&&!found;a++){
      var f=buildTaut(vars,ops);
      if(evalType(f,vars)==='tautologie')found=f;
    }
    // If structured failed, try random
    var depth=Math.min(n+2,6);
    for(var a=0;a<3000&&!found;a++){
      var f=buildRand(vars,ops,depth,{});
      if(evalType(f,vars)==='tautologie')found=f;
    }
    if(!found)found=buildTaut(vars,ops); // guaranteed fallback
  } else if(genType==='contradictie'){
    for(var a=0;a<20&&!found;a++){
      var f=buildContra(vars,ops);
      if(evalType(f,vars)==='contradictie')found=f;
    }
    var depth=Math.min(n+2,6);
    for(var a=0;a<3000&&!found;a++){
      var f=buildRand(vars,ops,depth,{});
      if(evalType(f,vars)==='contradictie')found=f;
    }
    if(!found)found=buildContra(vars,ops);
  } else {
    // Contingentie: random with all vars used
    var depth=Math.min(n+1,5);
    for(var a=0;a<3000&&!found;a++){
      var usedVars={};
      var f=buildRand(vars,ops,depth,usedVars);
      // prefer formulas using multiple vars
      var usedCount=Object.keys(usedVars).length;
      if(evalType(f,vars)==='contingentie'&&(vars.length<=1||usedCount>=Math.min(vars.length,2)))found=f;
    }
    if(!found){
      // Absolute fallback contingentie
      if(vars.length>=2)found='('+vars[0]+'→'+vars[1]+')';
      else found=vars[0];
    }
  }

  el.style.color='var(--accent)';el.textContent=found;
  var useBtn=document.createElement('button');useBtn.className='gen-use-btn';useBtn.textContent='Gebruik →';
  useBtn.onclick=function(){switchTab('solve');inp.value=found;inp.focus();};
  var copyBtn=document.createElement('button');copyBtn.className='copy-btn';copyBtn.textContent='Kopieer';
  copyBtn.onclick=function(){navigator.clipboard.writeText(found).then(function(){copyBtn.textContent='✓';setTimeout(function(){copyBtn.textContent='Kopieer';},1500);});};
  resDiv.appendChild(useBtn);resDiv.appendChild(copyBtn);
}
</script>
