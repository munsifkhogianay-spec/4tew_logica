<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logica</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0ff;
      --surface: #ffffff;
      --surface2: #ede7ff;
      --border: #d8cef7;
      --accent: #8b5cf6;
      --accent2: #f472b6;
      --text: #2d1b69;
      --text-muted: #9381c0;
      --val-1: #059669;
      --val-0: #e11d48;
      --result-bg: #f0ebff;
      --error-bg: #fff0f4;
      --error-border: #f472b6;
      --shadow: 0 4px 24px rgba(139,92,246,0.10);
    }

    /* ── DARK MODE ── */
    body.dark {
      --bg: #13101f;
      --surface: #1e1830;
      --surface2: #2a2245;
      --border: #3a2f5e;
      --text: #e9e2ff;
      --text-muted: #7c6aaa;
      --result-bg: #1c1535;
      --error-bg: #2a0f1f;
      --shadow: 0 4px 24px rgba(0,0,0,0.35);
    }

    /* ── LIGHT THEMES ── */
    [data-theme="mint"] {
      --bg: #f0fdf8;
      --surface: #ffffff;
      --surface2: #d1fae5;
      --border: #a7f3d0;
      --accent: #10b981;
      --accent2: #3b82f6;
      --text: #064e3b;
      --text-muted: #34d399;
      --result-bg: #ecfdf5;
      --shadow: 0 4px 24px rgba(16,185,129,0.10);
    }
    [data-theme="peach"] {
      --bg: #fff7ed;
      --surface: #ffffff;
      --surface2: #ffe4cc;
      --border: #fdba74;
      --accent: #f97316;
      --accent2: #ec4899;
      --text: #7c2d12;
      --text-muted: #fb923c;
      --result-bg: #fff3e8;
      --shadow: 0 4px 24px rgba(249,115,22,0.10);
    }
    [data-theme="sky"] {
      --bg: #f0f9ff;
      --surface: #ffffff;
      --surface2: #dbeafe;
      --border: #93c5fd;
      --accent: #3b82f6;
      --accent2: #8b5cf6;
      --text: #1e3a5f;
      --text-muted: #60a5fa;
      --result-bg: #eff6ff;
      --shadow: 0 4px 24px rgba(59,130,246,0.10);
    }

    /* ── DARK THEME VARIANTS ── */
    body.dark[data-theme="mint"] {
      --bg: #081a13;
      --surface: #0f2a1e;
      --surface2: #153d2b;
      --border: #1f5c3f;
      --text: #d1fae5;
      --text-muted: #34d399;
      --result-bg: #0d2319;
      --shadow: 0 4px 24px rgba(0,0,0,0.35);
    }
    body.dark[data-theme="peach"] {
      --bg: #1a0f07;
      --surface: #2a180a;
      --surface2: #3d2210;
      --border: #6b3a15;
      --text: #fff0e0;
      --text-muted: #fb923c;
      --result-bg: #221208;
      --shadow: 0 4px 24px rgba(0,0,0,0.35);
    }
    body.dark[data-theme="sky"] {
      --bg: #08101f;
      --surface: #0f1e35;
      --surface2: #162d4f;
      --border: #1e3f6e;
      --text: #dbeafe;
      --text-muted: #60a5fa;
      --result-bg: #0c1828;
      --shadow: 0 4px 24px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      padding: 32px 20px;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -1px;
      line-height: 1;
    }
    h1 span {
      font-style: italic;
      font-weight: 400;
      color: var(--accent2);
    }
    .subtitle {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 5px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* Theme switcher */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }
    .theme-switcher {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .theme-switcher span {
      font-size: 0.68rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-right: 2px;
    }
    .dark-toggle {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      user-select: none;
    }
    .dark-toggle span {
      font-size: 0.68rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .toggle-track {
      width: 38px;
      height: 20px;
      background: var(--border);
      border-radius: 99px;
      position: relative;
      transition: background 0.25s;
    }
    body.dark .toggle-track { background: var(--accent); }
    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.25s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    body.dark .toggle-thumb { transform: translateX(18px); }
    .theme-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }
    .theme-dot:hover { transform: scale(1.2); }
    .theme-dot.active { border-color: var(--text); }
    .theme-dot[data-t="default"] { background: linear-gradient(135deg, #8b5cf6, #f472b6); }
    .theme-dot[data-t="mint"]    { background: linear-gradient(135deg, #10b981, #3b82f6); }
    .theme-dot[data-t="peach"]   { background: linear-gradient(135deg, #f97316, #ec4899); }
    .theme-dot[data-t="sky"]     { background: linear-gradient(135deg, #3b82f6, #8b5cf6); }

    /* Symbols */
    .symbols {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }
    .sym-btn {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: var(--shadow);
    }
    .sym-btn:hover {
      background: var(--surface2);
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    .sym-label {
      font-size: 0.6rem;
      color: var(--text-muted);
      display: block;
      text-align: center;
      margin-top: 1px;
    }

    /* Hint */
    .hint {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 14px;
      line-height: 1.7;
    }
    .hint span { color: var(--accent); font-weight: 600; }

    /* Input row */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .formula-input {
      flex: 1;
      min-width: 200px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', monospace;
      font-size: 1rem;
      padding: 10px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: var(--shadow);
    }
    .formula-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
    }
    .formula-input.error { border-color: var(--error-border); }
    .formula-input::placeholder { color: var(--text-muted); opacity: 0.7; }

    .btn {
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 10px 22px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 14px color-mix(in srgb, var(--accent) 35%, transparent);
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-clear {
      background: var(--surface);
      border: 2px solid var(--border);
      color: var(--text-muted);
      box-shadow: none;
    }
    .btn-clear:hover { border-color: var(--accent); color: var(--accent); }

    /* Error */
    .error-msg {
      color: var(--error-border);
      font-size: 0.78rem;
      margin-bottom: 12px;
      padding: 10px 14px;
      background: var(--error-bg);
      border-radius: 10px;
      border-left: 3px solid var(--error-border);
    }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      border-radius: 16px;
      border: 1.5px solid var(--border);
      margin-top: 16px;
      box-shadow: var(--shadow);
      background: var(--surface);
    }
    table { border-collapse: collapse; font-size: 0.83rem; width: 100%; }
    thead tr { background: var(--surface2); }
    th {
      padding: 10px 16px;
      text-align: center;
      font-weight: 700;
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
      border-right: 1px solid var(--border);
      color: var(--text);
    }
    th:last-child { border-right: none; }
    th.var-col { color: var(--accent2); }
    th.sub-col { color: var(--text-muted); font-size: 0.75rem; font-weight: 500; }
    th.result-col {
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, var(--surface2));
    }
    td {
      padding: 9px 16px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      background: var(--surface);
    }
    td:last-child { border-right: none; }
    tr:last-child td { border-bottom: none; }
    tr:nth-child(even) td { background: color-mix(in srgb, var(--bg) 60%, var(--surface)); }
    tr:hover td { background: var(--surface2) !important; }
    .val-0 { color: var(--val-0); font-weight: 700; }
    .val-1 { color: var(--val-1); font-weight: 700; }
    .result-td { background: var(--result-bg) !important; border-left: 2px solid color-mix(in srgb, var(--accent) 30%, transparent) !important; }
    tr:hover .result-td { background: color-mix(in srgb, var(--accent) 12%, var(--surface)) !important; }
    .divider-th { border-left: 2px solid var(--border) !important; }
    .divider-td { border-left: 2px solid var(--border) !important; }

    /* Stats */
    .stats {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .stat {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 0.75rem;
      box-shadow: var(--shadow);
      min-width: 70px;
    }
    .stat-label { color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-size: 0.63rem; }
    .stat-val { color: var(--text); font-size: 1.05rem; font-weight: 700; margin-top: 3px; }
    .taut  { color: #059669; }
    .contra { color: #e11d48; }
    .conting { color: #d97706; }
  </style>
</head>
<body>

  <div class="top-bar">
    <div>
      <h1>Logica<span>.</span></h1>
      <div class="subtitle">Logische uitspraken · Waarheidstabellen · Stap voor stap</div>
    </div>
    <div class="controls">
      <div class="theme-switcher">
        <span>Kleur</span>
        <div class="theme-dot active" data-t="default" onclick="setTheme('default', this)" title="Paars"></div>
        <div class="theme-dot" data-t="mint"    onclick="setTheme('mint', this)"    title="Munt"></div>
        <div class="theme-dot" data-t="peach"   onclick="setTheme('peach', this)"   title="Perzik"></div>
        <div class="theme-dot" data-t="sky"     onclick="setTheme('sky', this)"     title="Hemel"></div>
      </div>
      <div class="dark-toggle" onclick="toggleDark()">
        <span id="darkLabel">Licht</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
    </div>
  </div>

  <div class="symbols" id="symbols"></div>

  <div class="hint">
    Typ variabelen als letters: <span>p, q, r, ...</span> &nbsp;|&nbsp;
    Alternatief: <span>&amp; = ∧</span>, <span>| = ∨</span>, <span>~ = ¬</span>, <span>-&gt; = →</span>, <span>&lt;-&gt; = ↔</span>
  </div>

  <div class="input-row">
    <input id="formulaInput" class="formula-input" placeholder="bijv.  (s→¬p)→(¬t∨v)" />
    <button class="btn" onclick="solve()">Oplossen</button>
    <button class="btn btn-clear" onclick="clearAll()">Wis</button>
  </div>

  <div id="errorMsg" class="error-msg" style="display:none"></div>
  <div id="tableWrap"></div>
  <div id="stats" class="stats"></div>

  <script>
    function setTheme(t, el) {
      document.body.setAttribute('data-theme', t === 'default' ? '' : t);
      document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
      el.classList.add('active');
    }

    function toggleDark() {
      const isDark = document.body.classList.toggle('dark');
      document.getElementById('darkLabel').textContent = isDark ? 'Donker' : 'Licht';
    }

    const SYMBOLS = [
      { sym: "¬", label: "NOT" }, { sym: "∧", label: "AND" }, { sym: "∨", label: "OR" },
      { sym: "→", label: "IMP" }, { sym: "↔", label: "EQV" }, { sym: "(", label: "" }, { sym: ")", label: "" },
    ];
    const symContainer = document.getElementById("symbols");
    const input = document.getElementById("formulaInput");

    SYMBOLS.forEach(({ sym, label }) => {
      const btn = document.createElement("button");
      btn.className = "sym-btn";
      btn.innerHTML = sym + (label ? `<span class="sym-label">${label}</span>` : "");
      btn.onclick = () => {
        const start = input.selectionStart, end = input.selectionEnd;
        input.value = input.value.slice(0, start) + sym + input.value.slice(end);
        input.focus();
        input.setSelectionRange(start + sym.length, start + sym.length);
      };
      symContainer.appendChild(btn);
    });

    input.addEventListener("keydown", e => { if (e.key === "Enter") solve(); });

    function showError(msg) {
      const el = document.getElementById("errorMsg");
      el.textContent = "⚠ " + msg;
      el.style.display = "block";
      input.classList.add("error");
    }
    function hideError() {
      document.getElementById("errorMsg").style.display = "none";
      input.classList.remove("error");
    }
    function clearAll() {
      input.value = "";
      hideError();
      document.getElementById("tableWrap").innerHTML = "";
      document.getElementById("stats").innerHTML = "";
    }

    function tokenize(formula) {
      const tokens = []; let i = 0;
      while (i < formula.length) {
        const ch = formula[i];
        if (/\s/.test(ch)) { i++; continue; }
        if (/[a-zA-Z]/.test(ch)) { tokens.push({ type: "VAR", val: ch }); i++; continue; }
        if (ch === "¬" || ch === "~" || ch === "!") { tokens.push({ type: "NOT" }); i++; continue; }
        if (ch === "∧" || ch === "&") { tokens.push({ type: "AND" }); i++; continue; }
        if (ch === "∨" || ch === "|") { tokens.push({ type: "OR" }); i++; continue; }
        if (ch === "→") { tokens.push({ type: "IMP" }); i++; continue; }
        if (ch === "-" && formula[i+1] === ">") { tokens.push({ type: "IMP" }); i += 2; continue; }
        if (ch === "↔") { tokens.push({ type: "EQV" }); i++; continue; }
        if (ch === "<" && formula[i+1] === "-" && formula[i+2] === ">") { tokens.push({ type: "EQV" }); i += 3; continue; }
        if (ch === "(") { tokens.push({ type: "LPAREN" }); i++; continue; }
        if (ch === ")") { tokens.push({ type: "RPAREN" }); i++; continue; }
        if (ch === "0" || ch === "1") { tokens.push({ type: "LIT", val: +ch }); i++; continue; }
        throw new Error(`Onbekend symbool: '${ch}'`);
      }
      return tokens;
    }

    function parse(tokens) {
      let pos = 0;
      const peek = () => tokens[pos];
      const consume = () => tokens[pos++];
      function parseEqv() {
        let left = parseImp();
        while (peek()?.type === "EQV") { consume(); const right = parseImp(); left = { type: "EQV", left, right, label: `(${left.label}↔${right.label})` }; }
        return left;
      }
      function parseImp() {
        let left = parseOr();
        while (peek()?.type === "IMP") { consume(); const right = parseOr(); left = { type: "IMP", left, right, label: `(${left.label}→${right.label})` }; }
        return left;
      }
      function parseOr() {
        let left = parseAnd();
        while (peek()?.type === "OR") { consume(); const right = parseAnd(); left = { type: "OR", left, right, label: `(${left.label}∨${right.label})` }; }
        return left;
      }
      function parseAnd() {
        let left = parseNot();
        while (peek()?.type === "AND") { consume(); const right = parseNot(); left = { type: "AND", left, right, label: `(${left.label}∧${right.label})` }; }
        return left;
      }
      function parseNot() {
        if (peek()?.type === "NOT") { consume(); const child = parseNot(); return { type: "NOT", child, label: `¬${child.label}` }; }
        return parseAtom();
      }
      function parseAtom() {
        const t = peek();
        if (!t) throw new Error("Onverwacht einde van formule");
        if (t.type === "VAR") { consume(); return { type: "VAR", val: t.val, label: t.val }; }
        if (t.type === "LIT") { consume(); return { type: "LIT", val: t.val, label: String(t.val) }; }
        if (t.type === "LPAREN") {
          consume(); const expr = parseEqv();
          if (peek()?.type !== "RPAREN") throw new Error("Sluitend haakje ) ontbreekt");
          consume(); return expr;
        }
        throw new Error(`Onverwacht teken: '${t.val || t.type}'`);
      }
      const result = parseEqv();
      if (pos < tokens.length) throw new Error("Onverwacht teken na formule");
      return result;
    }

    function collectSubformulas(node, result = [], seen = new Set()) {
      if (!node) return result;
      if (node.child) collectSubformulas(node.child, result, seen);
      if (node.left)  collectSubformulas(node.left,  result, seen);
      if (node.right) collectSubformulas(node.right, result, seen);
      if (node.type !== "VAR" && node.type !== "LIT" && !seen.has(node.label)) { seen.add(node.label); result.push(node); }
      return result;
    }

    function evaluate(node, env) {
      switch (node.type) {
        case "VAR": return env[node.val];
        case "LIT": return node.val;
        case "NOT": return evaluate(node.child, env) === 1 ? 0 : 1;
        case "AND": return evaluate(node.left, env) === 1 && evaluate(node.right, env) === 1 ? 1 : 0;
        case "OR":  return evaluate(node.left, env) === 1 || evaluate(node.right, env) === 1 ? 1 : 0;
        case "IMP": return evaluate(node.left, env) === 0 || evaluate(node.right, env) === 1 ? 1 : 0;
        case "EQV": return evaluate(node.left, env) === evaluate(node.right, env) ? 1 : 0;
      }
    }

    function extractVars(formula) {
      const vars = new Set();
      for (const ch of formula) if (/[a-zA-Z]/.test(ch)) vars.add(ch);
      return [...vars].sort();
    }

    function solve() {
      hideError();
      const formula = input.value.trim();
      if (!formula) return;
      let vars, subformulas, ast, table;
      try {
        const tokens = tokenize(formula);
        ast = parse(tokens);
        vars = extractVars(formula);
        subformulas = collectSubformulas(ast);
        const n = vars.length, rows = 1 << n;
        table = [];
        for (let i = 0; i < rows; i++) {
          const env = {};
          vars.forEach((v, idx) => { env[v] = (i >> idx) & 1; });
          const subValues = {};
          subformulas.forEach(sf => { subValues[sf.label] = evaluate(sf, env); });
          table.push({ env, subValues, result: evaluate(ast, env) });
        }
      } catch(e) { showError(e.message); return; }

      const rootLabel = ast.label;
      const intermediate = subformulas.filter(sf => sf.label !== rootLabel);
      let html = `<div class="table-wrap"><table><thead><tr>`;
      vars.forEach(v => { html += `<th class="var-col">${v}</th>`; });
      intermediate.forEach((sf, i) => { html += `<th class="sub-col${i===0?' divider-th':''}">${sf.label}</th>`; });
      html += `<th class="result-col">${rootLabel}</th></tr></thead><tbody>`;
      table.forEach(row => {
        html += "<tr>";
        vars.forEach(v => { html += `<td class="${row.env[v]===1?'val-1':'val-0'}">${row.env[v]}</td>`; });
        intermediate.forEach((sf, i) => {
          const val = row.subValues[sf.label];
          html += `<td class="${i===0?' divider-td':''} ${val===1?'val-1':'val-0'}">${val}</td>`;
        });
        html += `<td class="result-td ${row.result===1?'val-1':'val-0'}">${row.result}</td></tr>`;
      });
      html += "</tbody></table></div>";
      document.getElementById("tableWrap").innerHTML = html;

      const ones = table.filter(r => r.result === 1).length, total = table.length;
      const type = ones===total?"tautology":ones===0?"contradiction":"contingency";
      const typeNL = type==="tautology"?"Tautologie":type==="contradiction"?"Contradictie":"Contingentie";
      const typeClass = type==="tautology"?"taut":type==="contradiction"?"contra":"conting";
      document.getElementById("stats").innerHTML = `
        <div class="stat"><div class="stat-label">Rijen</div><div class="stat-val">${total}</div></div>
        <div class="stat"><div class="stat-label">Stappen</div><div class="stat-val">${subformulas.length}</div></div>
        <div class="stat"><div class="stat-label">Uitkomst 1</div><div class="stat-val taut">${ones}</div></div>
        <div class="stat"><div class="stat-label">Uitkomst 0</div><div class="stat-val contra">${total-ones}</div></div>
        <div class="stat"><div class="stat-label">Type</div><div class="stat-val ${typeClass}">${typeNL}</div></div>`;
    }
  </script>
</body>
</html>
